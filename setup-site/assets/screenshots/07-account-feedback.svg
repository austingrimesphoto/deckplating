<svg xmlns="http://www.w3.org/2000/svg" width="960" height="640" viewBox="0 0 960 640" role="img" aria-labelledby="title desc">
  <title id="title">Deckplating Account screen feedback link with demo data</title>
  <desc id="desc">Scrubbed representative screenshot showing account switch, sign out, and feedback link.</desc>
  <rect width="960" height="640" fill="#eef2f5"/>
  <rect x="250" y="28" width="460" height="584" rx="28" fill="#101c28"/>
  <rect x="270" y="52" width="420" height="536" rx="20" fill="#f8fbfd"/>
  <text x="300" y="96" font-family="Arial, sans-serif" font-size="14" font-weight="700" fill="#255a82">ACCOUNT</text>
  <text x="300" y="132" font-family="Arial, sans-serif" font-size="32" font-weight="800" fill="#17212b">Demo Chaplain</text>
  <rect x="300" y="170" width="360" height="190" rx="12" fill="#fff" stroke="#d6dee6"/>
  <text x="322" y="204" font-family="Arial, sans-serif" font-size="22" font-weight="800" fill="#17212b">Account</text>
  <text x="322" y="232" font-family="Arial, sans-serif" font-size="15" fill="#5f6d7a">Leave this name, move to another workspace,</text>
  <text x="322" y="252" font-family="Arial, sans-serif" font-size="15" fill="#5f6d7a">or send pilot feedback.</text>
  <rect x="322" y="278" width="316" height="42" rx="8" fill="#fff" stroke="#d6dee6"/>
  <text x="392" y="305" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#17324d">Switch workspace</text>
  <rect x="322" y="330" width="316" height="42" rx="8" fill="#fff" stroke="#d6dee6"/>
  <text x="414" y="357" font-family="Arial, sans-serif" font-size="15" font-weight="700" fill="#17324d">Send feedback</text>
  <rect x="300" y="388" width="360" height="120" rx="12" fill="#eef6fb" stroke="#bdd4e7"/>
  <text x="322" y="424" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#17324d">Safe Use</text>
  <text x="322" y="452" font-family="Arial, sans-serif" font-size="15" fill="#5f6d7a">Unclassified, non-sensitive coverage</text>
  <text x="322" y="472" font-family="Arial, sans-serif" font-size="15" fill="#5f6d7a">tracking only.</text>
</svg>
