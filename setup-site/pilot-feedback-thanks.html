<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deckplating Pilot Feedback</title>
    <style>
      :root {
        --bg: #eef2f5;
        --surface: #ffffff;
        --text: #17212b;
        --muted: #5f6d7a;
        --line: #d6dee6;
        --brand: #17324d;
        --brand-2: #255a82;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background: var(--bg);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 18px;
      }

      main {
        width: min(100%, 620px);
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--surface);
        box-shadow: 0 1px 2px rgba(20, 30, 40, 0.06);
      }

      .eyebrow {
        margin: 0 0 5px;
        color: var(--brand-2);
        font-size: 0.78rem;
        font-weight: 900;
        text-transform: uppercase;
      }

      h1,
      p {
        margin-top: 0;
      }

      a {
        color: var(--brand-2);
        font-weight: 800;
      }

      .actions {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .button {
        min-height: 46px;
        display: inline-grid;
        place-items: center;
        padding: 10px 12px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--brand);
        font-weight: 900;
        text-align: center;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Pilot Feedback</p>
      <h1>Feedback received</h1>
      <p>Your submission was sent to the Deckplating setup-site form inbox.</p>
      <p>Keep all future feedback unclassified and non-sensitive. Do not send counseling, medical, personal, or sensitive operational details through this form.</p>
      <div class="actions">
        <a class="button" href="/#feedback">Send another response</a>
        <a class="button" href="/">Return to setup site</a>
      </div>
    </main>
  </body>
</html>
