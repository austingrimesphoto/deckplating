name: Database behavior checks

on:
  push:
    branches:
      - 'ci/**'
  pull_request:
  workflow_dispatch:
    inputs:
      controlled_failure:
        description: Intentionally falsify the idempotency assertion to prove failure detection
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: database-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  database:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0
      - run: npm ci
      - name: Reset empty database and run behavior checks
        env:
          DECKPLATING_TEST_CONTROLLED_FAILURE: ${{ ((github.event_name == 'workflow_dispatch' && inputs.controlled_failure) || (github.event_name == 'push' && contains(github.event.head_commit.message, '[controlled-db-failure]'))) && 'idempotency' || '' }}
        run: npm run test:database
      - name: Stop disposable Supabase stack
        if: always()
        run: supabase stop --no-backup >/dev/null 2>&1 || true
