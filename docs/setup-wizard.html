<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deckplating Setup Wizard</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: #17212b;
        background: #f4f6f8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 24px;
      }

      main {
        width: min(100%, 760px);
        margin: 0 auto;
      }

      section {
        display: grid;
        gap: 14px;
        margin: 18px 0;
        padding: 18px;
        border: 1px solid #d9e0e7;
        border-radius: 8px;
        background: #fff;
      }

      h1,
      h2,
      p {
        margin-top: 0;
      }

      label {
        display: grid;
        gap: 6px;
        color: #647181;
        font-weight: 700;
      }

      input,
      textarea,
      button {
        width: 100%;
        min-height: 46px;
        border-radius: 8px;
        font: inherit;
      }

      input,
      textarea {
        border: 1px solid #d9e0e7;
        padding: 10px 12px;
      }

      textarea {
        min-height: 220px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      button {
        border: 0;
        background: #17324d;
        color: #fff;
        font-weight: 800;
      }

      .muted {
        color: #647181;
      }

      .notice {
        display: none;
        color: #287a3e;
        font-weight: 800;
      }

      .lookup-result {
        display: none;
        padding: 10px 12px;
        border-radius: 8px;
        background: #eef8f0;
        color: #287a3e;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Deckplating Setup Wizard</h1>
      <p class="muted">
        This page runs only in your browser and creates the environment variables Netlify needs.
        Credential values stay in this page. The optional map lookup sends only the installation name to OpenStreetMap when you click it.
      </p>

      <section>
        <h2>Paste Your Values</h2>
        <label>
          Supabase Project URL
          <input id="supabaseUrl" type="url" autocomplete="url" placeholder="https://your-project.supabase.co" />
        </label>
        <label>
          Supabase service_role key
          <input id="serviceRoleKey" type="password" autocomplete="off" spellcheck="false" placeholder="Paste the service_role key from Supabase" />
        </label>
        <label>
          Admin passphrase
          <input id="adminPassphrase" type="password" minlength="12" autocomplete="new-password" spellcheck="false" placeholder="At least 12 characters" />
        </label>
        <label>
          Confirm admin passphrase
          <input id="adminPassphraseConfirmation" type="password" minlength="12" autocomplete="new-password" spellcheck="false" />
        </label>
        <label>
          Installation or unit name
          <input id="installationName" placeholder="Naval Air Station Key West" />
        </label>
        <button id="lookupInstallation" type="button">Look Up Map Center</button>
        <p id="lookupResult" class="lookup-result"></p>
        <label>
          Default map latitude
          <input id="mapDefaultLatitude" type="number" min="-90" max="90" step="any" inputmode="decimal" placeholder="24.57" />
        </label>
        <label>
          Default map longitude
          <input id="mapDefaultLongitude" type="number" min="-180" max="180" step="any" inputmode="decimal" placeholder="-81.78" />
        </label>
        <label>
          Map tile/style URL, optional
          <input id="mapTileUrl" type="url" autocomplete="url" placeholder="Leave blank for basic map tiles" />
        </label>
        <label>
          Map tile key, optional
          <input id="mapTileKey" type="password" autocomplete="off" spellcheck="false" placeholder="Leave blank unless your map provider gives you a key" />
        </label>
        <button id="generate" type="button">Generate Netlify Values</button>
      </section>

      <section>
        <h2>Copy This Into Netlify</h2>
        <textarea id="output" readonly></textarea>
        <button id="copy" type="button">Copy All</button>
        <p id="notice" class="notice">Copied.</p>
      </section>
    </main>

    <script>
      const field = (id) => document.getElementById(id);

      function randomHex(bytes) {
        const data = new Uint8Array(bytes);
        crypto.getRandomValues(data);
        return Array.from(data, (byte) => byte.toString(16).padStart(2, '0')).join('');
      }

      async function sha256(value) {
        const encoded = new TextEncoder().encode(value);
        const digest = await crypto.subtle.digest('SHA-256', encoded);
        return Array.from(new Uint8Array(digest), (byte) => byte.toString(16).padStart(2, '0')).join('');
      }

      field('generate').addEventListener('click', async () => {
        const supabaseUrl = field('supabaseUrl').value.trim();
        const serviceRoleKey = field('serviceRoleKey').value.trim();
        const adminPassphrase = field('adminPassphrase').value;
        const adminPassphraseConfirmation = field('adminPassphraseConfirmation').value;
        const installationName = field('installationName').value.trim();
        const mapDefaultLatitude = field('mapDefaultLatitude').value.trim();
        const mapDefaultLongitude = field('mapDefaultLongitude').value.trim();
        const mapTileUrl = field('mapTileUrl').value.trim();
        const mapTileKey = field('mapTileKey').value.trim();

        if (!supabaseUrl || !serviceRoleKey || !adminPassphrase || !installationName || !mapDefaultLatitude || !mapDefaultLongitude) {
          alert('Fill in Supabase Project URL, service_role key, admin passphrase, installation name, latitude, and longitude.');
          return;
        }
        if (adminPassphrase.length < 12) {
          alert('Use an admin passphrase with at least 12 characters.');
          return;
        }
        if (adminPassphrase !== adminPassphraseConfirmation) {
          alert('Admin passphrases do not match.');
          return;
        }

        const latitude = Number(mapDefaultLatitude);
        const longitude = Number(mapDefaultLongitude);
        if (!Number.isFinite(latitude) || latitude < -90 || latitude > 90 || !Number.isFinite(longitude) || longitude < -180 || longitude > 180) {
          alert('Enter a latitude from -90 to 90 and a longitude from -180 to 180.');
          return;
        }

        try {
          const envLine = (key, value) => `${key}=${JSON.stringify(String(value))}`;
          const lines = [
            envLine('SUPABASE_URL', supabaseUrl),
            envLine('SUPABASE_SERVICE_ROLE_KEY', serviceRoleKey),
            envLine('ADMIN_PASSPHRASE_HASH', await sha256(adminPassphrase)),
            envLine('ADMIN_SESSION_SECRET', randomHex(32)),
            envLine('CREDENTIAL_PEPPER', randomHex(32)),
            envLine('MAP_TILE_URL', mapTileUrl),
            envLine('MAP_TILE_KEY', mapTileKey),
            envLine('MAP_DEFAULT_LATITUDE', mapDefaultLatitude),
            envLine('MAP_DEFAULT_LONGITUDE', mapDefaultLongitude),
            envLine('INSTALLATION_NAME', installationName),
          ];
          field('output').value = lines.join('\n');
        } catch (error) {
          alert('Your browser could not generate the values. Try Chrome, Edge, Safari, or Firefox.');
        }
      });

      field('copy').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(field('output').value);
          field('notice').textContent = 'Copied.';
        } catch {
          field('output').focus();
          field('output').select();
          field('notice').textContent = 'Copy was blocked. The text is selected. Press Ctrl+C or Command+C.';
        }
        field('notice').style.display = 'block';
        setTimeout(() => {
          field('notice').style.display = 'none';
        }, 3000);
      });

      field('lookupInstallation').addEventListener('click', async () => {
        const installationName = field('installationName').value.trim();
        const result = field('lookupResult');
        if (!installationName) {
          alert('Type an installation or unit name first.');
          return;
        }

        result.style.display = 'block';
        result.textContent = 'Looking up map center...';

        try {
          const params = new URLSearchParams({ q: installationName });
          const response = await fetch(`https://deckplating.netlify.app/api/installations/search?${params.toString()}`, {
            headers: { accept: 'application/json' },
          });
          if (!response.ok) throw new Error('Lookup failed.');
          const payload = await response.json();
          const match = payload.results?.[0];
          if (!match) {
            result.textContent = 'No match found. Enter latitude and longitude manually.';
            return;
          }

          field('mapDefaultLatitude').value = Number(match.lat).toFixed(6);
          field('mapDefaultLongitude').value = Number(match.lon).toFixed(6);
          result.textContent = `Found: ${match.display_name}`;
        } catch {
          result.textContent = 'Lookup failed. Enter latitude and longitude manually.';
        }
      });
    </script>
  </body>
</html>
